name: Backend Tests

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: crypto_user
          POSTGRES_PASSWORD: crypto_password123
          POSTGRES_DB: crypto_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crypto_user -d crypto_tracker"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      neo4j:
        image: neo4j:5.14-community
        env:
          NEO4J_AUTH: neo4j/password123
        ports:
          - 7474:7474
          - 7687:7687

    env:
      PYTHONPATH: backend
      ENV: test
      INTEL_PROVIDER: mock
      JWT_SECRET: ci-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      POSTGRES_URL: postgresql://crypto_user:crypto_password123@localhost:5432/crypto_tracker
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile Python files
        run: |
          python -m compileall backend/app backend/tests
          find backend/app backend/tests -name "*.py" -print0 | xargs -0 python -m py_compile

      - name: Run tests
        run: |
          python -m pytest backend/tests -v
