<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Fraud Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #161b22 0%, #1c2128 100%); border-bottom: 1px solid #30363d;
      padding: 20px 32px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header .badge { background: #1f6feb; color: white; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: 600; }
    .header .spacer { margin-left: auto; }
    .header .user-chip { font-size: 13px; color: #8b949e; display: flex; align-items: center; gap: 10px; }
    .header .logout { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 6px 14px;
      border-radius: 6px; cursor: pointer; font-size: 12px; }
    .header .logout:hover { background: #30363d; }
    .container { max-width: 1500px; margin: 0 auto; padding: 24px 32px; }
    .search-bar { display: flex; gap: 12px; margin-bottom: 12px; }
    .search-bar input { flex: 1; background: #161b22; border: 1px solid #30363d; color: #e6edf3;
      padding: 14px 16px; border-radius: 8px; font-size: 14px; font-family: monospace; }
    .search-bar input:focus { outline: none; border-color: #1f6feb; }
    .search-bar select { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 0 12px; border-radius: 8px; font-size: 14px; }
    .btn { background: #238636; color: white; border: none; padding: 14px 28px; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #30363d; cursor: not-allowed; }
    .layout { display: grid; grid-template-columns: 260px 1fr; gap: 24px; margin-top: 24px; }
    @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }
    .grid { display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
    @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 16px; }
    .score-circle { width: 130px; height: 130px; border-radius: 50%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; margin: 0 auto 16px; border: 6px solid; }
    .score-value { font-size: 36px; font-weight: 700; line-height: 1; }
    .score-label { font-size: 12px; text-transform: uppercase; margin-top: 4px; }
    .risk-critical { color: #f85149; border-color: #f85149; }
    .risk-high { color: #fb8500; border-color: #fb8500; }
    .risk-medium { color: #d29922; border-color: #d29922; }
    .risk-low { color: #3fb950; border-color: #3fb950; }
    .explanation { background: #0d1117; border-left: 3px solid #1f6feb; padding: 12px 16px;
      border-radius: 6px; font-size: 14px; line-height: 1.5; margin-top: 16px; }
    .metric-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #21262d; font-size: 14px; }
    .metric-row:last-child { border-bottom: none; }
    .metric-row .label { color: #8b949e; }
    .metric-row .value { font-weight: 600; font-family: monospace; }
    .badge-cat { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin: 2px; }
    #graph { width: 100%; height: 500px; background: #0d1117; border-radius: 8px; }
    .node-label { font-size: 9px; fill: #8b949e; pointer-events: none; }
    .timeline-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: #1f6feb; margin-top: 4px; flex-shrink: 0; }
    .timeline-content { flex: 1; }
    .timeline-time { color: #8b949e; font-size: 11px; }
    .loading { text-align: center; padding: 40px; color: #8b949e; }
    .empty { text-align: center; padding: 60px 20px; color: #6e7681; }
    .empty svg { margin-bottom: 16px; opacity: 0.4; }
    .error { background: #2d1418; border: 1px solid #f85149; color: #ff7b72; padding: 12px 16px;
      border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; color: #8b949e; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    .examples { margin-top: 4px; font-size: 12px; color: #6e7681; }
    .examples code { background: #161b22; padding: 2px 6px; border-radius: 4px; cursor: pointer; margin-right: 8px; font-size: 11px; }
    .examples code:hover { background: #1f6feb; color: white; }
    .history-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; height: fit-content; }
    .history-panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .history-refresh { background: none; border: none; color: #1f6feb; cursor: pointer; font-size: 12px; }
    .history-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; border: 1px solid transparent; transition: all 0.15s; }
    .history-item:hover { background: #1c2128; border-color: #30363d; }
    .history-item.active { background: #1c2128; border-color: #1f6feb; }
    .history-wallet { font-family: monospace; font-size: 12px; color: #e6edf3; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { display: flex; gap: 6px; align-items: center; font-size: 11px; }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .history-crime { color: #8b949e; }
    .history-empty { color: #6e7681; font-size: 12px; text-align: center; padding: 20px 10px; }
    /* Login */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 40px;
      width: 100%; max-width: 400px; }
    .login-logo { text-align: center; margin-bottom: 8px; font-size: 32px; }
    .login-card h1 { font-size: 22px; text-align: center; margin-bottom: 6px; }
    .login-card .sub { text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 28px; }
    .login-field { margin-bottom: 16px; }
    .login-field label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    .login-field input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
      padding: 12px 14px; border-radius: 8px; font-size: 14px; }
    .login-field input:focus { outline: none; border-color: #1f6feb; }
    .login-btn { width: 100%; background: #238636; color: white; border: none; padding: 13px;
      border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .login-btn:hover { background: #2ea043; }
    .login-btn:disabled { background: #30363d; cursor: not-allowed; }
    .login-toggle { text-align: center; margin-top: 20px; font-size: 13px; color: #8b949e; }
    .login-toggle a { color: #58a6ff; cursor: pointer; }

    /* Modais (conta + admin) */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      width: 100%; max-width: 440px; max-height: 85vh; overflow-y: auto; }
    .modal-wide { max-width: 760px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center;
      padding: 20px 24px; border-bottom: 1px solid #30363d; }
    .modal-header h2 { font-size: 16px; }
    .modal-close { background: none; border: none; color: #8b949e; font-size: 26px;
      cursor: pointer; line-height: 1; }
    .modal-close:hover { color: #e6edf3; }
    .modal-tabs { display: flex; gap: 4px; padding: 12px 24px 0; border-bottom: 1px solid #30363d; }
    .modal-tabs button { background: none; border: none; color: #8b949e; padding: 8px 14px;
      cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; }
    .modal-tabs button.active { color: #e6edf3; border-bottom-color: #1f6feb; }
    .modal-body { padding: 24px; }
    .modal-msg { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
    .modal-msg.ok { background: #12261e; border: 1px solid #3fb950; color: #56d364; }
    .modal-msg.err { background: #2d1418; border: 1px solid #f85149; color: #ff7b72; }
    .header-btn { background: #21262d; border: 1px solid #30363d; color: #e6edf3;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .header-btn:hover { background: #30363d; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th { text-align: left; color: #8b949e; font-weight: 600; padding: 8px;
      border-bottom: 1px solid #30363d; text-transform: uppercase; font-size: 11px; }
    .admin-table td { padding: 10px 8px; border-bottom: 1px solid #21262d; }
    .role-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .role-admin { background: #1f6feb33; color: #58a6ff; }
    .role-analyst { background: #8b949e22; color: #8b949e; }
    .role-select { background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
      padding: 4px 8px; border-radius: 6px; font-size: 12px; margin-right: 8px; }
    .del-btn { background: #2d1418; border: 1px solid #f85149; color: #ff7b72;
      padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .del-btn:hover { background: #3d1a1f; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const API = "http://localhost:8000";

    const CATEGORY_COLORS = {
      ransomware: "#f85149", scam: "#db61a2", darknet: "#bc8cff", mixer: "#fb8500",
      exchange: "#3fb950", gambling: "#d29922", marketplace: "#58a6ff",
      legitimate: "#56d364", unknown: "#8b949e",
    };
    const LEVEL_COLORS = { critical: "#f85149", high: "#fb8500", medium: "#d29922", low: "#3fb950" };

    // Token em memória (módulo). Não usa localStorage.
    let AUTH_TOKEN = null;
    function authHeaders() {
      return AUTH_TOKEN ? { "Authorization": `Bearer ${AUTH_TOKEN}` } : {};
    }

    // ---------- LOGIN ----------
    function LoginScreen({ onAuth }) {
      const [mode, setMode] = useState("login"); // login | register
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [email, setEmail] = useState("");
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);

      async function submit() {
        if (!username.trim() || !password.trim()) { setError("Preencha usuário e senha"); return; }
        setLoading(true); setError(null);
        try {
          const endpoint = mode === "login" ? "/api/v1/auth/login" : "/api/v1/auth/register";
          const body = mode === "login"
            ? { username, password }
            : { username, password, email: email || null };
          const res = await fetch(`${API}${endpoint}`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Falha na autenticação");
          onAuth(data.access_token, { username: data.username, role: data.role });
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="login-wrap">
          <div className="login-card">
            <div className="login-logo">🔍</div>
            <h1>Crypto Fraud Tracker</h1>
            <div className="sub">{mode === "login" ? "Entre na sua conta" : "Crie sua conta"}</div>
            {error && <div className="error">⚠️ {error}</div>}
            <div className="login-field">
              <label>Usuário</label>
              <input value={username} onChange={e => setUsername(e.target.value)}
                onKeyDown={e => e.key === "Enter" && submit()} placeholder="seu_usuario" />
            </div>
            {mode === "register" && (
              <div className="login-field">
                <label>Email (opcional)</label>
                <input value={email} onChange={e => setEmail(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && submit()} placeholder="email@exemplo.com" />
              </div>
            )}
            <div className="login-field">
              <label>Senha</label>
              <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                onKeyDown={e => e.key === "Enter" && submit()} placeholder="••••••••" />
            </div>
            <button className="login-btn" onClick={submit} disabled={loading}>
              {loading ? "Aguarde..." : (mode === "login" ? "Entrar" : "Registrar")}
            </button>
            <div className="login-toggle">
              {mode === "login" ? (
                <span>Não tem conta? <a onClick={() => { setMode("register"); setError(null); }}>Registre-se</a></span>
              ) : (
                <span>Já tem conta? <a onClick={() => { setMode("login"); setError(null); }}>Entrar</a></span>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ---------- GRAFO ----------
    function ForceGraph({ data, initialWallet }) {
      const ref = useRef();
      useEffect(() => {
        if (!data || !data.nodes || data.nodes.length === 0) return;
        const svg = d3.select(ref.current);
        svg.selectAll("*").remove();
        const width = ref.current.clientWidth, height = 500;

        const nodes = data.nodes.map(d => ({ ...d }));
        const links = data.edges.map(d => ({ ...d }));

        // Container que recebe zoom/pan
        const g = svg.append("g");

        // Zoom + Pan (scroll para zoom, arrastar para mover)
        const zoom = d3.zoom()
          .scaleExtent([0.2, 4])
          .on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        const sim = d3.forceSimulation(nodes)
          .force("link", d3.forceLink(links).id(d => d.id).distance(110))
          .force("charge", d3.forceManyBody().strength(-350))
          .force("center", d3.forceCenter(width / 2, height / 2))
          .force("collide", d3.forceCollide().radius(40));

        const defs = svg.append("defs");
        defs.append("marker").attr("id", "arrow").attr("viewBox", "0 -5 10 10")
          .attr("refX", 24).attr("refY", 0).attr("markerWidth", 6).attr("markerHeight", 6)
          .attr("orient", "auto").append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#484f58");

        const link = g.append("g").selectAll("line").data(links).join("line")
          .attr("stroke", "#484f58").attr("stroke-width", 1.5).attr("marker-end", "url(#arrow)");

        const linkLabel = g.append("g").selectAll("text").data(links).join("text")
          .text(d => d.label).attr("font-size", 9).attr("fill", "#6e7681")
          .attr("text-anchor", "middle");

        const isInitial = (d) => d.id === initialWallet;

        const node = g.append("g").selectAll("circle").data(nodes).join("circle")
          .attr("r", d => isInitial(d) ? 22 : (d.category === "unknown" ? 13 : 17))
          .attr("fill", d => CATEGORY_COLORS[d.category] || "#8b949e")
          .attr("stroke", d => isInitial(d) ? "#e6edf3" : "#0d1117")
          .attr("stroke-width", d => isInitial(d) ? 3 : 2)
          .style("cursor", "pointer")
          .call(d3.drag()
            .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
            .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

        // Tooltip melhorado
        node.append("title").text(d =>
          `${d.id}\nCategoria: ${d.category}\nScore: ${d.risk_score}` +
          (isInitial(d) ? "\n★ Carteira investigada" : ""));

        // Anel extra na carteira inicial
        const initialRing = g.append("g").selectAll("circle.ring")
          .data(nodes.filter(isInitial)).join("circle")
          .attr("r", 28).attr("fill", "none")
          .attr("stroke", "#e6edf3").attr("stroke-width", 1).attr("stroke-dasharray", "3,3")
          .attr("opacity", 0.5);

        const label = g.append("g").selectAll("text").data(nodes).join("text")
          .attr("class", "node-label").attr("text-anchor", "middle")
          .attr("dy", d => isInitial(d) ? 36 : 28)
          .attr("font-weight", d => isInitial(d) ? "700" : "400")
          .attr("fill", d => isInitial(d) ? "#e6edf3" : "#8b949e")
          .text(d => d.label);

        sim.on("tick", () => {
          link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
          linkLabel.attr("x", d => (d.source.x + d.target.x) / 2).attr("y", d => (d.source.y + d.target.y) / 2 - 4);
          node.attr("cx", d => d.x).attr("cy", d => d.y);
          initialRing.attr("cx", d => d.x).attr("cy", d => d.y);
          label.attr("x", d => d.x).attr("y", d => d.y);
        });
      }, [data, initialWallet]);
      return <svg id="graph" ref={ref}></svg>;
    }

    function ScoreCard({ result }) {
      const level = result.risk_level || "low";
      return (
        <div className="card">
          <h2>Avaliação de Risco</h2>
          <div className={`score-circle risk-${level}`}>
            <div className="score-value">{result.overall_risk_score}</div>
            <div className="score-label">/ 100</div>
          </div>
          <div style={{ textAlign: "center", marginBottom: 16 }}>
            <span className={`badge-cat risk-${level}`} style={{ background: "transparent",
              border: "1px solid currentColor", fontSize: 13, padding: "5px 14px" }}>{level.toUpperCase()}</span>
          </div>
          <div className="explanation">{result.explanation}</div>
          <div style={{ marginTop: 16 }}>
            <div className="metric-row"><span className="label">Carteira inicial</span><span className="value">{result.initial_wallet_score}</span></div>
            <div className="metric-row"><span className="label">Score máximo</span><span className="value">{result.max_risk_score}</span></div>
            <div className="metric-row"><span className="label">Ponderado</span><span className="value">{result.weighted_risk_score}</span></div>
            <div className="metric-row"><span className="label">Wallets rastreadas</span><span className="value">{result.wallets_found}</span></div>
            <div className="metric-row"><span className="label">Crime suspeito</span><span className="value">{result.suspected_crime || "—"}</span></div>
            <div className="metric-row"><span className="label">Neo4j</span><span className="value" style={{ color: result.neo4j === "persisted" ? "#3fb950" : "#fb8500" }}>{result.neo4j}</span></div>
          </div>
          {result.dangerous_destinations && result.dangerous_destinations.length > 0 && (
            <div style={{ marginTop: 16 }}>
              <h2 style={{ marginBottom: 8 }}>Destinos Perigosos</h2>
              {result.dangerous_destinations.map((d, i) => (
                <span key={i} className="badge-cat" style={{ background: CATEGORY_COLORS[d.category] + "22", color: CATEGORY_COLORS[d.category] }}>{d.category}</span>
              ))}
            </div>
          )}
          {result.wallet_intel && result.wallet_intel.source && (
            <div style={{ marginTop: 16 }}>
              <h2 style={{ marginBottom: 8 }}>
                Inteligência da Carteira
                <span style={{ fontSize: 10, color: result.wallet_intel.source === "blockstream" ? "#3fb950" : "#8b949e", marginLeft: 8, textTransform: "none", letterSpacing: 0 }}>
                  {result.wallet_intel.source === "blockstream" ? "● dados reais" : "● mock"}
                </span>
              </h2>
              {result.wallet_intel.labeled_as && (
                <div className="explanation" style={{ borderLeftColor: "#f85149", marginTop: 0, marginBottom: 12 }}>
                  🏷️ Identificada como: <b>{result.wallet_intel.labeled_as}</b>
                </div>
              )}
              {result.wallet_intel.balance_btc != null && (
                <div className="metric-row"><span className="label">Saldo atual</span><span className="value">{result.wallet_intel.balance_btc} BTC</span></div>
              )}
              {result.wallet_intel.total_received_btc != null && (
                <div className="metric-row"><span className="label">Total recebido</span><span className="value">{result.wallet_intel.total_received_btc} BTC</span></div>
              )}
              {result.wallet_intel.total_sent_btc != null && (
                <div className="metric-row"><span className="label">Total enviado</span><span className="value">{result.wallet_intel.total_sent_btc} BTC</span></div>
              )}
              {result.wallet_intel.transactions_count != null && (
                <div className="metric-row"><span className="label">Nº transações</span><span className="value">{result.wallet_intel.transactions_count}</span></div>
              )}
            </div>
          )}
        </div>
      );
    }

    function Timeline({ events }) {
      if (!events || events.length === 0) return null;
      return (
        <div className="card">
          <h2>Timeline de Transações</h2>
          {events.slice(0, 15).map((e, i) => (
            <div className="timeline-item" key={i}>
              <div className="timeline-dot"></div>
              <div className="timeline-content">
                <div>{e.description}</div>
                <div className="timeline-time">{e.amount_btc ? `${e.amount_btc} BTC · ` : ""}{e.event_type}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function HistoryPanel({ items, activeId, onSelect, onRefresh }) {
      return (
        <div className="history-panel">
          <h2>Histórico<button className="history-refresh" onClick={onRefresh}>↻ atualizar</button></h2>
          {(!items || items.length === 0) && <div className="history-empty">Nenhuma investigação ainda</div>}
          {items && items.map((it) => (
            <div key={it.investigation_id}
                 className={`history-item ${it.investigation_id === activeId ? "active" : ""}`}
                 onClick={() => onSelect(it.investigation_id)}>
              <div className="history-wallet">{it.initial_wallet}</div>
              <div className="history-meta">
                <span className="history-dot" style={{ background: LEVEL_COLORS[it.risk_level] || "#8b949e" }}></span>
                <span style={{ color: LEVEL_COLORS[it.risk_level] || "#8b949e", fontWeight: 600 }}>
                  {it.overall_risk != null ? it.overall_risk : "—"}
                </span>
                <span className="history-crime">· {it.suspected_crime || "—"}</span>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ---------- DASHBOARD ----------
    function Dashboard({ user, onLogout }) {
      const [wallet, setWallet] = useState("");
      const [depth, setDepth] = useState(3);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [result, setResult] = useState(null);
      const [graph, setGraph] = useState(null);
      const [timeline, setTimeline] = useState(null);
      const [history, setHistory] = useState([]);
      const [total, setTotal] = useState(0);
      const [activeId, setActiveId] = useState(null);
      const [showAccount, setShowAccount] = useState(false);
      const [showAdmin, setShowAdmin] = useState(false);

      const examples = [
        "13AM4VW2dhxYgXeQepoHkHSQuy6NgaEb94",
        "1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa",
        "1BvBMSEYstWetqTFn5Au4m4GFg7xJaNVN2",
      ];

      async function apiGet(path) {
        const res = await fetch(`${API}${path}`, { headers: authHeaders() });
        if (res.status === 401) { onLogout(); throw new Error("Sessão expirada"); }
        return res.json();
      }

      async function loadHistory() {
        try {
          const r = await apiGet("/api/v1/investigations/recent");
          setHistory(r.investigations || []);
          setTotal(r.total || 0);
        } catch (e) {}
      }

      useEffect(() => { loadHistory(); }, []);

      async function loadReports(invId) {
        const [g, t] = await Promise.all([
          apiGet(`/api/v1/report/${invId}/graph`),
          apiGet(`/api/v1/report/${invId}/timeline`),
        ]);
        setGraph(g);
        setTimeline(t.timeline);
      }

      async function investigate(addr) {
        const target = addr || wallet;
        if (!target.trim()) { setError("Informe um endereço Bitcoin"); return; }
        setLoading(true); setError(null); setResult(null); setGraph(null); setTimeline(null);
        try {
          const res = await fetch(`${API}/api/v1/investigate`, {
            method: "POST",
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify({ wallet_address: target, depth: parseInt(depth) }),
          });
          if (res.status === 401) { onLogout(); return; }
          if (!res.ok) { const err = await res.json(); throw new Error(err.detail || "Erro na investigação"); }
          const data = await res.json();
          setResult(data);
          setActiveId(data.investigation_id);
          await loadReports(data.investigation_id);
          loadHistory();
        } catch (e) { setError(e.message); } finally { setLoading(false); }
      }

      async function reopen(invId) {
        setLoading(true); setError(null); setResult(null); setGraph(null); setTimeline(null);
        setActiveId(invId);
        try {
          const data = await apiGet(`/api/v1/investigation/${invId}`);
          setResult(data);
          setWallet(data.wallet_address || "");
          await loadReports(invId);
        } catch (e) { setError("Erro ao reabrir investigação"); } finally { setLoading(false); }
      }

      return (
        <div>
          {showAccount && <AccountModal user={user} onClose={() => setShowAccount(false)} />}
          {showAdmin && <AdminPanel onClose={() => setShowAdmin(false)} onLogout={onLogout} />}
          <div className="header">
            <span style={{ fontSize: 24 }}>🔍</span>
            <h1>Crypto Fraud Tracker</h1>
            <span className="badge">v2.0</span>
            <span className="spacer"></span>
            <div className="user-chip">
              <span>{total} salvas · 👤 {user.username} ({user.role})</span>
              {user.role === "admin" && (
                <button className="header-btn" onClick={() => setShowAdmin(true)}>Admin</button>
              )}
              <button className="header-btn" onClick={() => setShowAccount(true)}>Minha Conta</button>
              <button className="logout" onClick={onLogout}>Sair</button>
            </div>
          </div>
          <div className="container">
            <div className="search-bar">
              <input placeholder="Endereço Bitcoin (ex: bc1q... ou 1A1z...)" value={wallet}
                onChange={e => setWallet(e.target.value)} onKeyDown={e => e.key === "Enter" && investigate()} />
              <select value={depth} onChange={e => setDepth(e.target.value)}>
                <option value="1">Depth 1</option><option value="2">Depth 2</option>
                <option value="3">Depth 3</option><option value="4">Depth 4</option>
              </select>
              <button className="btn" onClick={() => investigate()} disabled={loading}>
                {loading ? "Investigando..." : "Investigar"}
              </button>
            </div>
            <div className="examples">
              Exemplos:
              {examples.map((ex, i) => (
                <code key={i} onClick={() => { setWallet(ex); investigate(ex); }}>{ex.slice(0, 20)}...</code>
              ))}
            </div>

            {error && <div className="error" style={{ marginTop: 16 }}>⚠️ {error}</div>}

            <div className="layout">
              <HistoryPanel items={history} activeId={activeId} onSelect={reopen} onRefresh={loadHistory} />
              <div>
                {loading && <div className="loading">Carregando...</div>}
                {!result && !loading && (
                  <div className="empty">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                    <p>Informe um endereço ou selecione uma investigação do histórico</p>
                  </div>
                )}
                {result && (
                  <div className="grid">
                    <div><ScoreCard result={result} /></div>
                    <div>
                      <div className="card">
                        <h2>Grafo de Transações</h2>
                        <ForceGraph data={graph} initialWallet={result.wallet_address} />
                        <div className="legend">
                          {Object.entries(CATEGORY_COLORS).map(([cat, color]) => (
                            <div className="legend-item" key={cat}>
                              <span className="legend-dot" style={{ background: color }}></span>{cat}
                            </div>
                          ))}
                        </div>
                      </div>
                      <Timeline events={timeline} />
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ---------- MODAL: MINHA CONTA ----------
    function AccountModal({ user, onClose }) {
      const [tab, setTab] = useState("perfil");
      const [email, setEmail] = useState("");
      const [curPass, setCurPass] = useState("");
      const [newPass, setNewPass] = useState("");
      const [msg, setMsg] = useState(null);
      const [err, setErr] = useState(null);

      async function saveEmail() {
        setMsg(null); setErr(null);
        try {
          const res = await fetch(`${API}/api/v1/auth/me/email`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify({ email }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Erro");
          setMsg("Email atualizado para " + data.email);
        } catch (e) { setErr(e.message); }
      }

      async function savePassword() {
        setMsg(null); setErr(null);
        try {
          const res = await fetch(`${API}/api/v1/auth/change-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify({ current_password: curPass, new_password: newPass }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Erro");
          setMsg("Senha alterada com sucesso");
          setCurPass(""); setNewPass("");
        } catch (e) { setErr(e.message); }
      }

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h2>Minha Conta</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="modal-tabs">
              <button className={tab === "perfil" ? "active" : ""} onClick={() => { setTab("perfil"); setMsg(null); setErr(null); }}>Perfil</button>
              <button className={tab === "email" ? "active" : ""} onClick={() => { setTab("email"); setMsg(null); setErr(null); }}>Email</button>
              <button className={tab === "senha" ? "active" : ""} onClick={() => { setTab("senha"); setMsg(null); setErr(null); }}>Senha</button>
            </div>
            <div className="modal-body">
              {msg && <div className="modal-msg ok">{msg}</div>}
              {err && <div className="modal-msg err">⚠️ {err}</div>}

              {tab === "perfil" && (
                <div>
                  <div className="metric-row"><span className="label">Usuário</span><span className="value">{user.username}</span></div>
                  <div className="metric-row"><span className="label">Papel</span><span className="value">{user.role}</span></div>
                </div>
              )}
              {tab === "email" && (
                <div>
                  <div className="login-field">
                    <label>Novo email</label>
                    <input value={email} onChange={e => setEmail(e.target.value)} placeholder="novo@email.com" />
                  </div>
                  <button className="btn" onClick={saveEmail}>Salvar email</button>
                </div>
              )}
              {tab === "senha" && (
                <div>
                  <div className="login-field">
                    <label>Senha atual</label>
                    <input type="password" value={curPass} onChange={e => setCurPass(e.target.value)} />
                  </div>
                  <div className="login-field">
                    <label>Nova senha (12+ char, maiúscula, número, especial)</label>
                    <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} />
                  </div>
                  <button className="btn" onClick={savePassword}>Alterar senha</button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ---------- PAINEL ADMIN ----------
    function AdminPanel({ onClose, onLogout }) {
      const [users, setUsers] = useState([]);
      const [err, setErr] = useState(null);
      const [msg, setMsg] = useState(null);

      async function load() {
        setErr(null);
        try {
          const res = await fetch(`${API}/api/v1/admin/users`, { headers: authHeaders() });
          if (res.status === 401) { onLogout(); return; }
          if (res.status === 403) { setErr("Acesso restrito a administradores"); return; }
          const data = await res.json();
          setUsers(data.users || []);
        } catch (e) { setErr(e.message); }
      }
      useEffect(() => { load(); }, []);

      async function changeRole(id, role) {
        setMsg(null); setErr(null);
        try {
          const res = await fetch(`${API}/api/v1/admin/users/${id}/role`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify({ role }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Erro");
          setMsg("Papel atualizado"); load();
        } catch (e) { setErr(e.message); }
      }

      async function removeUser(id, username) {
        if (!confirm(`Remover o usuário ${username}?`)) return;
        setMsg(null); setErr(null);
        try {
          const res = await fetch(`${API}/api/v1/admin/users/${id}`, {
            method: "DELETE", headers: authHeaders(),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Erro");
          setMsg("Usuário removido"); load();
        } catch (e) { setErr(e.message); }
      }

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h2>Painel Admin — Usuários</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="modal-body">
              {msg && <div className="modal-msg ok">{msg}</div>}
              {err && <div className="modal-msg err">⚠️ {err}</div>}
              <table className="admin-table">
                <thead>
                  <tr><th>ID</th><th>Usuário</th><th>Email</th><th>Papel</th><th>Ações</th></tr>
                </thead>
                <tbody>
                  {users.map(u => (
                    <tr key={u.id}>
                      <td>{u.id}</td>
                      <td>{u.username}</td>
                      <td>{u.email || "—"}</td>
                      <td><span className={`role-badge role-${u.role}`}>{u.role}</span></td>
                      <td>
                        <select value={u.role} onChange={e => changeRole(u.id, e.target.value)} className="role-select">
                          <option value="analyst">analyst</option>
                          <option value="admin">admin</option>
                        </select>
                        <button className="del-btn" onClick={() => removeUser(u.id, u.username)}>Remover</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ---------- APP (controla auth) ----------
    function App() {
      const [authed, setAuthed] = useState(false);
      const [user, setUser] = useState(null);

      function handleAuth(token, userInfo) {
        AUTH_TOKEN = token;
        setUser(userInfo);
        setAuthed(true);
      }
      function handleLogout() {
        AUTH_TOKEN = null;
        setUser(null);
        setAuthed(false);
      }

      if (!authed) return <LoginScreen onAuth={handleAuth} />;
      return <Dashboard user={user} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
